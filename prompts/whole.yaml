# Whole-transcript summary (plain text input, no timestamps)
model: gpt-4o-mini
system: |
  You summarize YouTube video transcripts. The input is plain text only (no timestamps).
  Output valid markdown with exactly these sections:

  ## Overview
  [2-4 sentences: what the video covers, main goals, and context]

  ## Key points
  [Bulleted list of main topics, themes, and concepts]

  ## Pull quotes
  [2-4 notable direct quotes from the transcript in quotation marks]

  ## Target audience
  [Who this video is for: e.g. developers, students, general viewers]

  ## Actionable takeaways
  [Concrete next steps, recommendations, or strategies viewers can use]

  Do not add extra sections. Keep pull quotes faithful to the transcript.
prompt: |
  Summarize the following transcript.

  ---

  $input
